<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast AI</title>
    <link rel="stylesheet" href="static/styles/forecast.css">
    <link rel="stylesheet" href="static/styles/index.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <main class="dashboard">
        <header>
            <h1>Weather Forecast AI</h1>
        </header>

        <section class="chart-container">
            <canvas id="weatherChart"></canvas>
        </section>

        <div class="date-nav">
            <button class="arrow-btn">❮</button>
            <span class="current-date"></span>
            <button class="arrow-btn">❯</button>
        </div>

        <div class="tabs">
            <button id="today-tab" class="tab" onclick="showForecast('today')">Today</button>
            <button id="weekly-tab" class="tab" onclick="showForecast('week')">Weekly</button>
        </div>

        <section id="forecast-display" class="weather-grid">
            </section>

        <footer class="date-picker-section">
            <div class="date-input-container">
                <input type="date" id="forecast_date" class="custom-date-input">
                <button class="card-button" onclick="handleNewDate()">Forecast AI</button>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
    <script src="index.js"></script>
</body>
</html>
